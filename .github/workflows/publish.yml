# Build + publie l'image storm-codex sur ghcr.io à chaque push main (et sur tag).
name: publish
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push vers ghcr.io (GITHUB_TOKEN suffit)
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/matella/storm-codex:latest
